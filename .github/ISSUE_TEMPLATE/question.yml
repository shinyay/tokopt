name: Question
description: Ask a question about how to use `tokopt`.
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check `docs/faq.md` and `docs/troubleshooting.md`.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried?
    validations:
      required: false
