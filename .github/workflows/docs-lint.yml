name: docs-lint

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-link-check:
    name: Markdown link check (lychee)
    runs-on: [self-hosted, linux, azure, aci]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee link checker on markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --cache
            --max-cache-age 1d
            --max-concurrency 4
            --retry-wait-time 10
            --max-retries 2
            --accept 200,206,429
            --exclude-all-private
            --exclude '^https?://'
            './**/*.md'
          fail: true
          format: markdown

  markdown-lint:
    name: Markdown style lint (markdownlint-cli2)
    runs-on: [self-hosted, linux, azure, aci]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2 on all markdown files
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !**/node_modules/**
